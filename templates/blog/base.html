<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My CMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font (Medium style) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }

        /* Navbar */
        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #eee;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 22px;
        }

        .nav-link {
            color: #555 !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #000 !important;
        }

        /* Container width like Medium */
        .main-container {
            max-width: 900px;
            margin: auto;
        }

        /* Card style */
        .card {
            border-radius: 12px;
            border: none;
        }

        .card img {
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        /* Hover effect */
        .hover-card {
            transition: 0.3s;
        }

        .hover-card:hover {
            transform: translateY(-5px);
        }

        /* Buttons */
        .btn-dark {
            border-radius: 20px;
            padding: 6px 16px;
        }

        /* Footer */
        footer {
            margin-top: 50px;
            padding: 20px 0;
            text-align: center;
            color: #777;
        }
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container main-container">

    <a class="navbar-brand" href="/">✍️ MediumCMS</a>

    <div class="ms-auto d-flex align-items-center gap-3">

        <a href="/" class="nav-link">Home</a>

        {% if user.is_authenticated %}
            <a href="/dashboard/" class="nav-link">Dashboard</a>
            <a href="/dashboard/create/" class="btn btn-dark">Write</a>
            <a href="/accounts/logout/" class="nav-link">Logout</a>
        {% else %}
            <a href="/accounts/login/" class="nav-link">Login</a>
            <a href="/accounts/register/" class="btn btn-dark">Get Started</a>
        {% endif %}

    </div>

  </div>
</nav>

<!-- 🧠 MAIN CONTENT -->
<div class="container main-container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- 🔻 FOOTER -->
<footer>
    <div class="container main-container">
        <p>© 2026 MediumCMS — Built with Django</p>
    </div>
</footer>

</body>
</html>
