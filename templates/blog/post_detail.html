{% extends 'blog/base.html' %}

{% block content %}
<div class="container mt-5">

  <h1 class="fw-bold">{{ post.title }}</h1>

  <p class="text-muted">
    ✍️ {{ post.author.username }} • {{ post.created_at|date:"M d, Y" }}
  </p>

  {% if post.image %}
    <img src="{{ post.image.url }}" class="img-fluid my-3">
  {% endif %}

  <div>
    {{ post.content|safe }}
  </div>

</div>
{% endblock %}
