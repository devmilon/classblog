<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="d-flex">

<!-- Sidebar -->
<div class="bg-dark text-white p-3 vh-100" style="width:260px;">
  <h4>✍️ CMS</h4>
  <hr>

  <a href="/dashboard/" class="text-white d-block mb-2">🏠 Dashboard</a>
  <a href="/dashboard/posts/" class="text-white d-block mb-2">📄 My Posts</a>
  <a href="/dashboard/create/" class="text-white d-block mb-2">✍️ Write</a>
  <a href="/accounts/profile/" class="text-white d-block mb-2">👤 Profile</a>
</div>

<!-- Content -->
<div class="flex-grow-1 p-4">
  {% block content %}{% endblock %}
</div>

</div>
</body>
</html>
